<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Chef Rafael Jacob | Chef Particular na Serra da Mantiqueira e Campos do Jordão</title>
    <meta name="description" content="Chef particular (personal chef) em Campos do Jordão e toda a Serra da Mantiqueira. A experiência de um ótimo restaurante na sua casa: jantares, churrasco, massas e eventos exclusivos com o Chef Rafael Jacob." />

    <!-- Endereço oficial do site (canonical) -->
    <link rel="canonical" href="https://paladaresdamantiqueira.com.br/" />

    <!-- Favicon / ícones (fundo creme, igual ao cabeçalho).
         O ?v=2 força os navegadores a baixar a versão nova, ignorando o ícone
         antigo (fundo preto) que ficou em cache. Tamanhos múltiplos de 48px =
         recomendação do Google para mostrar o favicon na busca. -->
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png?v=2" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png?v=2" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png?v=2" />
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />

    <!-- Open Graph / WhatsApp / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="Paladares da Mantiqueira" />
    <meta property="og:title" content="Chef Rafael Jacob | Gastronomia Exclusiva na sua Casa" />
    <meta property="og:description" content="Leve a sofisticação de um restaurante para a sua casa na Serra da Mantiqueira. Jantares, churrasco, massas e eventos exclusivos com chef particular." />
    <meta property="og:url" content="https://paladaresdamantiqueira.com.br/" />
    <meta property="og:image" content="https://paladaresdamantiqueira.com.br/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="1200" />

    <meta name="twitter:description" content="Chef particular na Serra da Mantiqueira — jantares, churrasco, massas e eventos exclusivos na sua casa." />
    <meta name="twitter:image" content="https://paladaresdamantiqueira.com.br/og-image.jpg" />

      "image": "https://paladaresdamantiqueira.com.br/og-image.jpg",
      "telephone": "+5512997710040",
      "priceRange": "$$$",
      "servesCuisine": ["Gastronomia de montanha", "Churrasco", "Cozinha autoral", "Cozinha italiana"],
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": -22.7386,
        "longitude": -45.5912
      },
      "areaServed": [
        {
          "@type": "GeoCircle",
          "geoMidpoint": { "@type": "GeoCoordinates", "latitude": -22.7386, "longitude": -45.5912 },
          "geoRadius": "100000"
        },
        { "@type": "Place", "name": "Campos do Jordão" },
        { "@type": "Place", "name": "Santo Antônio do Pinhal" },

      ]
    }

    <!-- Dados estruturados: Perguntas Frequentes (FAQ rich result).
         Gerado em build/dev a partir de src/data/faq.json pelo plugin seoInject
         (vite.config.ts) — fonte única, sempre em sincronia com o FAQ da página. -->
    <!--SEO_FAQ_JSONLD-->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Rafael Jacob",
      "jobTitle": "Chef Particular",

      "image": "https://paladaresdamantiqueira.com.br/og-image.jpg",
      "worksFor": { "@id": "https://paladaresdamantiqueira.com.br/" },
      "knowsAbout": ["Chef particular", "Personal chef", "Gastronomia de montanha", "Churrasco", "Cozinha autoral", "Eventos gastronômicos"],
      "sameAs": [
        "https://www.instagram.com/paladaresdamantiqueira/",
        "https://www.instagram.com/rafaeldjacob/"
      ]
    }
    </script>

    <!-- Dados estruturados: catálogo de experiências (Service + OfferCatalog).
         Gerado em build/dev a partir de src/data/experiencias.json pelo plugin
         seoInject (vite.config.ts) — mesma fonte única das fichas/site. -->
    <!--SEO_CATALOG_JSONLD-->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-42VSMJHHFD"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', 'G-42VSMJHHFD');
    </script>

    <style>
      body {
        background-color: #FDFCF9;
      }
      /* Conteúdo estático lido por buscadores antes do React carregar.
         É substituído pelo app assim que o JavaScript roda. */
      #seo-fallback {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 24px;
        font-family: 'Inter', system-ui, sans-serif;
        color: #2b2b2b;
        line-height: 1.6;
      }
      #seo-fallback h1, #seo-fallback h2 {
        font-family: 'Playfair Display', Georgia, serif;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Fallback de SEO: mesmo conteúdo da página, em HTML, para o Google E
           os crawlers de IA (que não executam JavaScript) indexarem o site.
           Preenchido em build/dev pelo plugin seoInject (vite.config.ts) a partir
           de src/data/experiencias.json e src/data/faq.json. O React o substitui ao carregar. -->
      <div id="seo-fallback"><!--SEO_FALLBACK--></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
